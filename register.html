<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Diriyah Train Management System - Register</title>
   <link rel="stylesheet" href="login.css" />
   <!-- Firebase App (the core Firebase SDK) -->
   <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
   <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>
   <div class="background"></div>
   <div class="login-container">
       <h1>Register</h1>
       <form id="register-form" novalidate>
           <div>
               <label for="full-name">Full Name</label>
               <input type="text" id="full-name" required />
               <p id="full-name-error" class="field-error" aria-live="polite"></p>
           </div>
           <div>
               <label for="email">Email</label>
               <input type="email" id="email" required />
               <p id="email-error" class="field-error" aria-live="polite"></p>
           </div>
           <div>
               <label for="password">Password</label>
               <input type="password" id="password" required />
               <p id="password-error" class="field-error" aria-live="polite"></p>
           </div>
           <div>
               <label for="confirm-password">Confirm Password</label>
               <input type="password" id="confirm-password" required />
               <p id="confirm-password-error" class="field-error" aria-live="polite"></p>
           </div>
           <div>
               <label for="register-role">Register As</label>
               <select id="register-role" required>
                   <option value="passenger" selected>Passenger</option>
                   <option value="staff">Staff</option>
                   <option value="admin">Admin</option>
               </select>
           </div>
           <div id="staff-code-group" style="display:none;">
               <label for="staff-code">Staff Code</label>
               <input type="password" id="staff-code" placeholder="Enter staff code" />
           </div>
           <div id="admin-code-group" style="display:none;">
               <label for="admin-code">Admin Code</label>
               <input type="password" id="admin-code" placeholder="Enter admin code" />
           </div>
           <p id="error" class="error" style="display:none"></p>
           <button id="register-btn" type="submit" class="primary-btn" disabled>
               <span class="btn-label">Register</span>
               <span class="btn-spinner" aria-hidden="true"></span>
           </button>
       </form>
       <div class="form-links">
           <a href="page.html" id="already-have">Already have an account? Login</a>
       </div>
       <button id="google-signup" class="google-btn">
           <img src="https://www.gstatic.com/images/branding/product/1x/googleg_32dp.png" alt="Google" class="google-icon" />
           Sign up with Google
       </button>
   </div>
    <script src="firebase-config.js"></script>
    <script src="role-routing.js"></script>
    <script src="app-notifications.js"></script>
    <script src="auth.js"></script>
</body>
</html>
