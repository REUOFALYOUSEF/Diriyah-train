<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Diriyah Train Management System - Login</title>
   <link rel="stylesheet" href="login.css" />
   <!-- Firebase App (the core Firebase SDK) -->
   <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
   <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>
   <div class="background"></div>
   <div class="login-container">
      <h1> Welcome to Diriyah Train Management System </h1>
       <h2>Login</h2>
       <form id="login-form">
           <div>
               <label for="email">Email</label>
               
               <input type="email" id="email" required />
           </div>
           <div>
               <label for="password">Password</label>
               <input type="password" id="password" required />
           </div>
           <div>
               <label for="login-role">Login As</label>
               <select id="login-role" required>
                   <option value="auto" selected>Auto Detect</option>
                   <option value="passenger">Passenger</option>
                   <option value="staff">Staff</option>
                   <option value="admin">Admin</option>
               </select>
           </div>
           <p id="role-hint" class="role-hint">Role hint: enter your email to detect account type.</p>
           <p id="error" class="error" style="display:none"></p>
           <button type="submit" class="primary-btn">Login</button>
       </form>
       <div class="form-links">
           <a href="#" id="forgot-password">Forgot password?</a>
           <span class="separator">|</span>
           <a href="register.html" id="sign-up">Sign up</a>
       </div>
       <button id="google-signin" class="google-btn">
           <img src="https://www.gstatic.com/images/branding/product/1x/googleg_32dp.png" alt="Google" class="google-icon" />
           Sign in with Google
       </button>
   </div>
    <script src="firebase-config.js"></script>
    <script src="role-routing.js"></script>
    <script src="app-notifications.js"></script>
    <script src="auth.js"></script>
</body>
</html>
